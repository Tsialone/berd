<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berd - Money Manager</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS Bootstrap -->
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.css}">

    <!-- Perfect Scrollbar -->
    <link rel="stylesheet" th:href="@{/assets/vendors/perfect-scrollbar/perfect-scrollbar.css}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" th:href="@{/assets/vendors/bootstrap-icons/bootstrap-icons.css}">

    <!-- App CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/app.css}">

    <!-- Loading.io Loader CSS -->
    <style>
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        #page-loader.loaded {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-wrapper {
            text-align: center;
        }
        
        .lds-circle,
        .lds-circle div {
            box-sizing: border-box;
        }
        
        .lds-circle {
            display: inline-block;
            transform: translateZ(1px);
        }
        
        .lds-circle > div {
            display: inline-block;
            width: 80px;
            height: 80px;
            margin: 8px;
            background: #435ebe;
            border-radius: 50%;
            animation: lds-circle 7.8s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }
        
        @keyframes lds-circle {
            0%, 100% {
                animation-timing-function: cubic-bezier(0.5, 0, 1, 0.5);
            }
            0% {
                transform: rotateY(0deg);
            }
            50% {
                transform: rotateY(1800deg);
                animation-timing-function: cubic-bezier(0, 0.5, 0.5, 1);
            }
            100% {
                transform: rotateY(3600deg);
            }
        }
        
        .loader-text {
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #435ebe;
            letter-spacing: 1px;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" th:href="@{/assets/images/logo/logo.png}" type="image/png">
</head>

<body>
    <!-- Loading.io Loader -->
    <div id="page-loader">
        <div class="loader-wrapper">
            <div class="lds-circle">
                <div></div>
            </div>
            <div class="loader-text">Chargement...</div>
        </div>
    </div>

    <div id="app">

        <!-- Toast Messages -->
        <div id="toastData" th:data-message="${toastMessage}" th:data-type="${toastType}" style="display:none"></div>

        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <!-- Main content -->
        <div id="main" class="layout-navbar">
            <!-- Header -->
            <div th:replace="fragments/header :: header"></div>

            <!-- Page content -->
            <div id="main-content" class="container mt-4">
                <div class="page-heading">
                    <!-- Page title fragment -->
                    <div th:replace="fragments/pagetitle :: pagetitle"></div>

                    <!-- Injection du fragment spécifique de la page -->
                    <div th:replace="~{${content} :: page}"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Scripts -->
    <script th:src="@{/assets/vendors/perfect-scrollbar/perfect-scrollbar.min.js}"></script>
    <script th:src="@{/assets/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/assets/js/main.js}"></script>

    <!-- Magnifique Loader Script -->
    <script>
        const loader = document.getElementById('page-loader');
        
        // Fonction pour masquer le loader
        function hideLoader() {
            if (loader) {
                loader.classList.add('loaded');
            }
        }
        
        // Fonction pour afficher le loader
        function showLoader() {
            if (loader) {
                loader.classList.remove('loaded');
                loader.style.display = 'flex';
            }
        }
        
        // Intercepter tous les clics sur les liens
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a[href]');
            
            // Ignorer si pas un lien interne
            if (!link || 
                link.getAttribute('href').startsWith('#') || 
                link.getAttribute('href').startsWith('http') ||
                link.hasAttribute('download') ||
                link.hasAttribute('target')) {
                return;
            }
            
            showLoader();
        });

        // Intercepter les soumissions de formulaires
        document.addEventListener('submit', function(e) {
            showLoader();
        });

        // Terminer le loader quand la page est chargée
        window.addEventListener('load', function() {
            setTimeout(hideLoader, 300);
        });

        // Au cas où l'utilisateur navigue en arrière
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                hideLoader();
            }
        });
    </script>

    <!-- Toast JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const toastDiv = document.getElementById('toastData');
        const msg = toastDiv.getAttribute('data-message');
        const type = toastDiv.getAttribute('data-type');

        if (msg) {
            Swal.fire({
                toast: true,
                position: 'top-right',
                showConfirmButton: false,
                timer: 5000,
                timerProgressBar: true,
                icon: type,
                title: msg
            });
        }
    </script>

    <script>
        console.log("GLOBAL SCRIPT LOADED");

        document.addEventListener("change", function (e) {

            if (e.target && e.target.id === "checkAll") {
                const checked = e.target.checked;
                document.querySelectorAll(".place-checkbox").forEach(cb => {
                    cb.checked = checked;
                });
            }

            if (e.target && e.target.classList.contains("place-checkbox")) {
                const all = document.querySelectorAll(".place-checkbox");
                const checked = document.querySelectorAll(".place-checkbox:checked");
                const checkAll = document.getElementById("checkAll");

                if (checkAll) {
                    checkAll.checked = (all.length === checked.length);
                }
            }
        });
    </script>
    

</body>

</html>
