<section class="section" th:fragment="page">
    <div class="row">
        <div class="col-12">
            <!-- Carte principale -->
            <div class="card">
                <div class="card-header">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
                        <h4 class="card-title mb-0">
                            <i class="bi bi-tags-fill me-2"></i>Fiche Détail Catégorie
                        </h4>
                        <div class="d-flex gap-2 flex-wrap">
                            <a th:href="@{/categorie-depense-details/edit/{id}(id=${detail.idCategorieDepenseDetail})}" 
                               class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil-square me-1"></i> Modifier
                            </a>
                            <button type="button" 
                                    class="btn btn-danger btn-sm"
                                    th:onclick="'supprimerDetail(' + ${detail.idCategorieDepenseDetail} + ')'">
                                <i class="bi bi-trash me-1"></i> Supprimer
                            </button>
                            <a th:href="@{/categorie-depense-details/liste}" class="btn btn-secondary btn-sm">
                                <i class="bi bi-arrow-left me-1"></i> Retour
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Libellé</label>
                            <div class="fw-bold fs-5" th:text="${detail.libelle}">Libellé</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Catégorie parent</label>
                            <div>
                                <a th:if="${categorieParent != null}"
                                   th:href="@{/categorie-depenses/fiche/{id}(id=${categorieParent.idCategorieDepense})}"
                                   class="text-decoration-none">
                                    <span class="badge bg-light-info fs-6">
                                        <i class="bi bi-tag-fill me-1"></i>
                                        <span th:text="${categorieParent.libelle}">Catégorie</span>
                                    </span>
                                </a>
                                <span th:unless="${categorieParent != null}" class="text-muted">
                                    Aucune catégorie parent
                                </span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Date de création</label>
                            <div th:text="${#temporals.format(detail.created, 'dd/MM/yyyy HH:mm')}">
                                06/03/2026 14:30
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .form-label {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
    </style>

    <script th:inline="javascript">
        function supprimerDetail(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce détail ?')) {
                window.location.href = '/categorie-depense-details/delete/' + id;
            }
        }
    </script>
</section>
