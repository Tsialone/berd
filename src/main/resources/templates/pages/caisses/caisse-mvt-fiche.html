<section class="section" th:fragment="page">
    <div class="row">
        <div class="col-12">
            <!-- Carte principale -->
            <div class="card">
                <div class="card-header">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
                        <h4 class="card-title mb-0">
                            <i class="bi bi-arrow-left-right me-2"></i>Fiche Mouvement Caisse
                        </h4>
                        <div class="d-flex gap-2 flex-wrap">
                            <a th:href="@{/caisses-mvts/edit/{id}(id=${mouvement.idCm})}" 
                               class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil-square me-1"></i> Modifier
                            </a>
                            <button type="button" 
                                    class="btn btn-danger btn-sm"
                                    th:onclick="'supprimerMouvement(' + ${mouvement.idCm} + ')'">
                                <i class="bi bi-trash me-1"></i> Supprimer
                            </button>
                            <a th:href="@{/caisses-mvts/liste}" class="btn btn-secondary btn-sm">
                                <i class="bi bi-arrow-left me-1"></i> Retour
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Date/Heure</label>
                            <div th:text="${#temporals.format(mouvement.created, 'dd/MM/yyyy HH:mm')}">06/03/2026 14:30</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Type</label>
                            <div>
                                <span th:if="${mouvement.type == 'DEBIT'}" class="badge bg-danger fs-6">
                                    <i class="bi bi-arrow-down me-1"></i>Débit
                                </span>
                                <span th:if="${mouvement.type == 'CREDIT'}" class="badge bg-success fs-6">
                                    <i class="bi bi-arrow-up me-1"></i>Crédit
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Caisse</label>
                            <div class="fw-bold fs-5" th:text="${mouvement.caisse.nom}">Nom caisse</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small">Montant</label>
                            <div class="fw-bold fs-5" th:text="${#numbers.formatDecimal(mouvement.getMontant() ?: 0, 1, 2)} + ' Ar'">0.00 Ar</div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12 mb-3">
                            <label class="form-label text-muted small">Dépense associée</label>
                            <div th:if="${mouvement.depense != null}">
                                <a th:href="@{/depenses/fiche/{id}(id=${mouvement.depense.idDepense})}" 
                                   class="text-decoration-none fw-bold">
                                    <i class="bi bi-file-text me-1"></i>
                                    <span th:text="${mouvement.depense.description}">Description dépense</span>
                                </a>
                            </div>
                            <div th:unless="${mouvement.depense != null}" class="text-muted">
                                Aucune dépense associée
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .form-label {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
    </style>

    <script th:inline="javascript">
        function supprimerMouvement(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce mouvement ?')) {
                window.location.href = '/caisses-mvts/delete/' + id;
            }
        }
    </script>
</section>
