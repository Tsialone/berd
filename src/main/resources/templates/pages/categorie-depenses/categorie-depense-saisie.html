<section class="section" th:fragment="page">
    <div class="row match-height">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title" th:text="${isEdit} ? 'Modifier une catégorie de dépense' : 'Ajouter une catégorie de dépense'"></h4>
                </div>
                <div class="card-content">
                    <div class="card-body">
                        <form class="form" method="post" th:action="@{/categorie-depenses/save}" th:object="${categorieDepense}">
                            <input type="hidden" th:field="*{idCategorieDepense}">
                            
                            <div class="row">
                                <div class="col-md-6 col-12">
                                    <div class="form-group">
                                        <label for="libelle">Libellé <span class="text-danger">*</span></label>
                                        <input type="text" 
                                               id="libelle" 
                                               th:field="*{libelle}"
                                               class="form-control" 
                                               placeholder="Ex: Automobile, Alimentation..."
                                               required>
                                    </div>
                                </div>

                                <div class="col-md-6 col-12">
                                    <div class="form-group">
                                        <label for="type">Type <span class="text-danger">*</span></label>
                                        <input type="text" 
                                               id="type" 
                                               th:field="*{type}"
                                               class="form-control" 
                                               placeholder="Ex: Fixe, Variable, Occasionnel..."
                                               required>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-3">
                                <a href="/categorie-depenses/liste" class="btn btn-light-secondary">
                                    <i class="bi bi-x-circle me-1"></i> Annuler
                                </a>
                                <button type="reset" class="btn btn-light-warning">
                                    <i class="bi bi-arrow-counterclockwise me-1"></i> Réinitialiser
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle me-1"></i> Enregistrer
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
