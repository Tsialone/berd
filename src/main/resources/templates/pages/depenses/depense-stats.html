<section class="section" th:fragment="page">
    <div class="card">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 stats-header-tools">
                <h4 class="card-title mb-0">Statistiques des dépenses</h4>
                <div class="d-flex align-items-center gap-2 stats-period-wrap">
                    <label for="periodeSelect" class="mb-0 text-muted small">Période</label>
                    <select id="periodeSelect" class="form-select form-select-sm" style="min-width: 200px;">
                        <option value="journaliere">Journalière</option>
                        <option value="hebdomadaire">Hebdomadaire</option>
                        <option value="mensuelle" selected>Mensuelle</option>
                        <option value="annuelle">Annuelle</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-body">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="border rounded p-3 h-100 bg-light-subtle">
                        <p class="text-muted mb-1">Dépense moyenne par période</p>
                        <h3 class="mb-0 text-primary" id="moyenneValue">0,00 Ar</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded p-3 h-100 bg-light-subtle">
                        <p class="text-muted mb-1">Période avec moyenne max</p>
                        <h5 class="mb-0" id="maxPeriodeLabel">-</h5>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="border rounded p-3 h-100 bg-light-subtle">
                        <p class="text-muted mb-1">Valeur max</p>
                        <h5 class="mb-0 text-success" id="maxPeriodeValue">0,00 Ar</h5>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>Label</th>
                            <th class="text-end">Dépense moyenne</th>
                        </tr>
                    </thead>
                    <tbody id="statsBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 stats-header-tools">
                <h4 class="card-title mb-0">Courbe des dépenses par catégorie</h4>
            </div>
        </div>
        <div class="card-body">
            <div class="d-flex flex-wrap gap-3 mb-3" id="courbeLegend"></div>
            <div class="border rounded p-2 chart-scroll-wrap">
                <svg id="categorieCourbeSvg" class="chart-svg" viewBox="0 0 920 360" width="100%" height="360" role="img" aria-label="Courbe des dépenses par catégorie"></svg>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <h4 class="card-title mb-0">Nombre de dépenses</h4>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12 col-lg-6">
                    <h6 class="mb-2">nbrDepenseParCategorie</h6>
                    <div class="border rounded p-2 chart-scroll-wrap">
                        <svg id="nbrCategorieSvg" class="bar-chart-svg" viewBox="0 0 560 300" width="100%" height="300" role="img" aria-label="Barres nombre de dépenses par catégorie"></svg>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <h6 class="mb-2">nbrDepenseParSousCategorie</h6>
                    <div class="border rounded p-2 chart-scroll-wrap">
                        <svg id="nbrSousCategorieSvg" class="bar-chart-svg" viewBox="0 0 560 300" width="100%" height="300" role="img" aria-label="Barres nombre de dépenses par sous-catégorie"></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .chart-scroll-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chart-svg {
            min-width: 920px;
        }

        .bar-chart-svg {
            min-width: 560px;
        }

        .courbe-legend-item {
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }

        .courbe-legend-item:hover {
            opacity: 0.75;
        }

        .courbe-legend-item.hidden-serie {
            opacity: 0.35;
        }

        @media (max-width: 768px) {
            .stats-header-tools {
                align-items: stretch !important;
            }

            .stats-period-wrap {
                width: 100%;
                justify-content: space-between;
            }

            .stats-period-wrap .form-select {
                min-width: 0 !important;
                width: 100%;
            }

            #courbeLegend {
                gap: 0.5rem !important;
            }

            #courbeLegend small {
                font-size: 0.75rem;
            }
        }
    </style>

    <script>

        function formatMontant(value) {
            const arrondi = Number(value || 0).toFixed(2);
            const [entier, decimal] = arrondi.split('.');
            const entierFormate = entier.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            return `${entierFormate},${decimal} Ar`;
        }

        function renderStatsFromData(data, moyenneGlobale, maxLabel, maxValue) {
            const tbody = document.getElementById('statsBody');
            const moyenneValue = document.getElementById('moyenneValue');
            const maxPeriodeLabel = document.getElementById('maxPeriodeLabel');
            const maxPeriodeValue = document.getElementById('maxPeriodeValue');

            tbody.innerHTML = '';

            if (data.length === 0) {
                moyenneValue.textContent = '0,00 Ar';
                maxPeriodeLabel.textContent = '-';
                maxPeriodeValue.textContent = '0,00 Ar';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.label}</td>
                    <td class="text-end fw-semibold">${formatMontant(item.depenseMoyenne ?? item.moyenne ?? 0)}</td>
                `;
                tbody.appendChild(tr);
            });

            moyenneValue.textContent = formatMontant(moyenneGlobale || 0);
            maxPeriodeLabel.textContent = maxLabel || '-';
            maxPeriodeValue.textContent = formatMontant(maxValue || 0);
        }

        async function renderStats(periodeKey) {
            const tbody = document.getElementById('statsBody');
            tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted">Chargement...</td></tr>`;

            try {
                const response = await fetch(`/api/depenses/stats/recap?periode=${encodeURIComponent(periodeKey)}`);
                if (!response.ok) throw new Error('Erreur API recap');

                const payload = await response.json();
                const data = payload.depenseMoyenneParPeriode || [];

                renderStatsFromData(data, payload.moyenneGlobale, payload.maxLabel, payload.maxValue);
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="2" class="text-center text-danger">Erreur de chargement recap</td></tr>`;
                renderStatsFromData([], 0, '-', 0);
            }
        }

            // ── Tooltip group ────────────────────────────────────────────────
            const tooltipG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            tooltipG.style.display = 'none';
            tooltipG.style.pointerEvents = 'none';

            const tooltipBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            tooltipBg.setAttribute('rx', '7');
            tooltipBg.setAttribute('ry', '7');
            tooltipBg.setAttribute('fill', 'rgba(22,27,40,0.88)');
            tooltipG.appendChild(tooltipBg);

            const tooltipContent = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            tooltipG.appendChild(tooltipContent);

            svg.appendChild(tooltipG);

            // ── Invisible overlay captures mouse events ──────────────────────
            const overlay = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            overlay.setAttribute('x', String(padLeft));
            overlay.setAttribute('y', String(padTop));
            overlay.setAttribute('width', String(chartW));
            overlay.setAttribute('height', String(chartH));
            overlay.setAttribute('fill', 'transparent');
            overlay.style.cursor = 'crosshair';
            svg.appendChild(overlay);

            function svgX(evt) {
                const bbox = svg.getBoundingClientRect();
                return (evt.clientX - bbox.left) * (width / bbox.width);
            }

            overlay.addEventListener('mousemove', (evt) => {
                const mx = svgX(evt);
                const n = cfg.labels.length;
                if (n === 0) return;

                // find nearest label index
                let nearestIdx = 0;
                let minDist = Infinity;
                for (let i = 0; i < n; i++) {
                    const px = padLeft + (chartW * i) / Math.max(n - 1, 1);
                    const d = Math.abs(px - mx);
                    if (d < minDist) { minDist = d; nearestIdx = i; }
                }

                const nx = padLeft + (chartW * nearestIdx) / Math.max(n - 1, 1);

                // crosshair
                vLine.setAttribute('x1', String(nx));
                vLine.setAttribute('x2', String(nx));
                vLine.setAttribute('y1', String(padTop));
                vLine.setAttribute('y2', String(padTop + chartH));
                vLine.style.display = '';

                // build tooltip lines
                const lineH = 18;
                const pad = 10;
                const rows = [];
                rows.push({ text: cfg.labels[nearestIdx], color: '#ffffff', bold: true });

                cfg.series.forEach((serie, sIdx) => {
                    if (hiddenSeries.has(sIdx)) return;
                    const val = serie.values[nearestIdx] ?? 0;
                    rows.push({
                        text: `${serie.name}: ${formatMontant(val)}`,
                        color: colors[sIdx % colors.length],
                        bold: false
                    });
                });

                // estimate tooltip width from longest text
                const maxChars = Math.max(...rows.map(r => r.text.length));
                const tipW = maxChars * 6.8 + pad * 2;
                const tipH = rows.length * lineH + pad * 2;

                // position: right of line, flip left near edge
                let tx = nx + 14;
                if (tx + tipW > width - padRight) tx = nx - tipW - 14;
                const ty = padTop + 10;

                tooltipBg.setAttribute('x', String(tx));
                tooltipBg.setAttribute('y', String(ty));
                tooltipBg.setAttribute('width', String(tipW));
                tooltipBg.setAttribute('height', String(tipH));

                tooltipContent.innerHTML = '';
                rows.forEach((row, i) => {
                    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    t.setAttribute('x', String(tx + pad));
                    t.setAttribute('y', String(ty + pad + (i + 1) * lineH - 4));
                    t.setAttribute('font-size', row.bold ? '12' : '11');
                    t.setAttribute('fill', row.color);
                    if (row.bold) t.setAttribute('font-weight', 'bold');
                    t.textContent = row.text;
                    tooltipContent.appendChild(t);
                });

                tooltipG.style.display = '';
            });

            overlay.addEventListener('mouseleave', () => {
                tooltipG.style.display = 'none';
                vLine.style.display = 'none';
            });
        }

        async function renderCourbeCategorie(periodeKey) {
            const svg = document.getElementById('categorieCourbeSvg');
            const legend = document.getElementById('courbeLegend');

            svg.innerHTML = '';
            legend.innerHTML = '<small class="text-muted">Chargement...</small>';

            try {
                const response = await fetch(`/api/depenses/stats/courbe-categorie?periode=${encodeURIComponent(periodeKey)}`);
                if (!response.ok) throw new Error('Erreur API courbe categorie');

                const payload = await response.json();
                renderCourbeCategorieFromConfig({
                    labels: payload.labels || [],
                    series: payload.series || []
                });
            } catch (e) {
                svg.innerHTML = '';
                legend.innerHTML = '<small class="text-danger">Erreur de chargement courbe</small>';
            }
        }

        function renderBarChart(svgId, data, color) {
            const svg = document.getElementById(svgId);
            if (!svg) return;

            const items = data || [];
            const width = 560;
            const height = 300;
            const padLeft = 40;
            const padRight = 16;
            const padTop = 16;
            const padBottom = 70;
            const chartW = width - padLeft - padRight;
            const chartH = height - padTop - padBottom;
            const maxVal = Math.max(...items.map(i => Number(i.value || 0)), 1);

            svg.innerHTML = '';

            const axisX = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axisX.setAttribute('x1', padLeft);
            axisX.setAttribute('x2', padLeft + chartW);
            axisX.setAttribute('y1', padTop + chartH);
            axisX.setAttribute('y2', padTop + chartH);
            axisX.setAttribute('stroke', '#adb5bd');
            svg.appendChild(axisX);

            const axisY = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axisY.setAttribute('x1', padLeft);
            axisY.setAttribute('x2', padLeft);
            axisY.setAttribute('y1', padTop);
            axisY.setAttribute('y2', padTop + chartH);
            axisY.setAttribute('stroke', '#adb5bd');
            svg.appendChild(axisY);

            const gap = 14;
            const barW = Math.max((chartW - gap * (items.length + 1)) / Math.max(items.length, 1), 18);

            items.forEach((item, idx) => {
                const value = Number(item.value || 0);
                const barH = (value / maxVal) * chartH;
                const x = padLeft + gap + idx * (barW + gap);
                const y = padTop + chartH - barH;

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', String(x));
                rect.setAttribute('y', String(y));
                rect.setAttribute('width', String(barW));
                rect.setAttribute('height', String(barH));
                rect.setAttribute('rx', '4');
                rect.setAttribute('fill', color);
                svg.appendChild(rect);

                const valText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                valText.setAttribute('x', String(x + barW / 2));
                valText.setAttribute('y', String(y - 6));
                valText.setAttribute('text-anchor', 'middle');
                valText.setAttribute('font-size', '11');
                valText.setAttribute('fill', '#495057');
                valText.textContent = String(value);
                svg.appendChild(valText);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', String(x + barW / 2));
                label.setAttribute('y', String(padTop + chartH + 18));
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', '10');
                label.setAttribute('fill', '#6c757d');
                label.textContent = item.label;
                svg.appendChild(label);
            });
        }

        function renderNbrDepensesFromData(payload) {
            renderBarChart('nbrCategorieSvg', payload.nbrDepenseParCategorie || payload.categories || [], '#0d6efd');
            renderBarChart('nbrSousCategorieSvg', payload.nbrDepenseParSousCategorie || payload.sousCategories || [], '#20c997');
        }

        async function renderNbrDepenses(periodeKey) {
            try {
                const response = await fetch(`/api/depenses/stats/barres?periode=${encodeURIComponent(periodeKey)}`);
                if (!response.ok) throw new Error('Erreur API barres');

                const payload = await response.json();
                renderNbrDepensesFromData(payload);
            } catch (e) {
                renderNbrDepensesFromData({ nbrDepenseParCategorie: [], nbrDepenseParSousCategorie: [] });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('periodeSelect');

            renderStats(select.value);
            renderCourbeCategorie(select.value);
            renderNbrDepenses(select.value);

            select.addEventListener('change', (e) => {
                renderStats(e.target.value);
                renderCourbeCategorie(e.target.value);
                renderNbrDepenses(e.target.value);
            });
        });
    </script>
