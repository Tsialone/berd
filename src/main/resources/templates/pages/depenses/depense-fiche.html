<section class="section" th:fragment="page">
    <div class="row match-height">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h4 class="card-title">Fiche Dépense #<span th:text="${depense.idDepense}">1</span></h4>
                </div>
                <div class="card-content">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6 col-12">
                                <div class="form-group">
                                    <label>Catégorie dépense</label>
                                    <input type="text" class="form-control" readonly 
                                           th:value="${depense.categorieDepense.libelle}">
                                </div>
                            </div>
                            
                            <div class="col-md-6 col-12">
                                <div class="form-group">
                                    <label>Date de la dépense</label>
                                    <input type="text" class="form-control" readonly 
                                           th:value="${#temporals.format(depense.created, 'dd/MM/yyyy HH:mm')}">
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-group">
                                    <label>Description</label>
                                    <textarea class="form-control" rows="3" readonly 
                                              th:text="${depense.description}">Description</textarea>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-group">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" disabled
                                               th:checked="${depense.estPrevue}">
                                        <label class="form-check-label">
                                            Dépense prévue
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/depenses/modifier/{id}(id=${depense.idDepense})}" 
                               class="btn btn-warning">
                                <i class="bi bi-pencil-square me-1"></i> Modifier
                            </a>
                            <a th:href="@{/depenses/annuler/{id}(id=${depense.idDepense})}" 
                               class="btn btn-danger"
                               onclick="return confirm('Annuler cette dépense ?')">
                                <i class="bi bi-x-circle me-1"></i> Annuler
                            </a>
                            <a th:href="@{/depenses/valider/{id}(id=${depense.idDepense})}"
                               class="btn btn-success"
                               onclick="return confirm('Valider cette dépense ?')">
                                <i class="bi bi-check-circle me-1"></i> Valider
                            </a>
                            <a th:href="@{/depenses/regler/{id}(id=${depense.idDepense})}"
                               class="btn btn-primary">
                                <i class="bi bi-cash-coin me-1"></i> Régler
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Section Détails de dépense -->
            <div class="card">
                <div class="card-header">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                        <div class="d-flex align-items-center">
                            <h5 class="card-title mb-0">
                                <i class="bi bi-list-check me-2"></i>Détails de la dépense
                            </h5>
                            <span class="badge bg-light-primary ms-2" 
                                  th:text="${depense.depenseDetails?.size() ?: 0} + ' ligne(s)'">0 ligne(s)</span>
                        </div>
                    </div>
                </div>
                <div class="card-body p-2 p-md-3">
                    <div th:if="${depense.depenseDetails != null and !depense.depenseDetails.isEmpty()}">
                        <div class="detail-item" th:each="detail, stat : ${depense.depenseDetails}">
                            <div class="detail-header">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="detail-badge" th:text="${stat.count}">1</span>
                                        <strong th:text="${detail.categorieDepenseDetail.libelle}">Catégorie détail</strong>
                                    </div>
                                    <span class="total-ligne" 
                                          th:text="${#numbers.formatDecimal(detail.qte * detail.pu, 1, 2)} + ' Ar'">0.00 Ar</span>
                                </div>
                            </div>
                            <div class="detail-body">
                                <div class="row g-2">
                                    <div class="col-md-4 col-12">
                                        <label class="form-label-sm">Description</label>
                                        <input type="text" class="form-control form-control-sm" readonly 
                                               th:value="${detail.designation}">
                                    </div>
                                    <div class="col-md-2 col-6">
                                        <label class="form-label-sm">Quantité</label>
                                        <input type="text" class="form-control form-control-sm" readonly 
                                               th:value="${#numbers.formatDecimal(detail.qte, 1, 3)}">
                                    </div>
                                    <div class="col-md-2 col-6">
                                        <label class="form-label-sm">Unité</label>
                                        <input type="text" class="form-control form-control-sm" readonly 
                                               th:value="${detail.unite?.libelle}">
                                    </div>
                                    <div class="col-md-2 col-6">
                                        <label class="form-label-sm">Prix Unitaire</label>
                                        <input type="text" class="form-control form-control-sm" readonly 
                                               th:value="${#numbers.formatDecimal(detail.pu, 1, 2)}">
                                    </div>
                                    <div class="col-md-2 col-6">
                                        <label class="form-label-sm">Total</label>
                                        <input type="text" class="form-control form-control-sm fw-bold" readonly 
                                               th:value="${#numbers.formatDecimal(detail.qte * detail.pu, 1, 2)} + ' Ar'">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div th:if="${depense.depenseDetails == null or depense.depenseDetails.isEmpty()}" 
                         class="text-center py-5">
                        <i class="bi bi-inbox text-muted" style="font-size: 3rem;"></i>
                        <p class="text-muted mt-2">Aucun détail</p>
                    </div>
                    
                    <!-- Total global -->
                    <div th:if="${depense.depenseDetails != null and !depense.depenseDetails.isEmpty()}" 
                         class="mt-3 pt-3 border-top">
                        <div class="row">
                            <div class="col-md-8"></div>
                            <div class="col-md-4">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0"><strong>Total Général:</strong></h5>
                                    <h4 class="mb-0 text-primary">
                                        <strong th:text="${#numbers.formatDecimal(depense.montantTotal ?: 0, 1, 2)} + ' Ar'">0.00 Ar</strong>
                                    </h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .detail-item {
            background: #fff;
            border: 1px solid #e9ecef;
            border-left: 3px solid #435ebe;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
        }
        
        .detail-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .detail-header {
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem 0.5rem 0 0;
        }
        
        .detail-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #435ebe;
            color: white;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .detail-body {
            padding: 0.75rem;
        }
        
        .form-label-sm {
            font-size: 0.7rem;
            color: #6c757d;
            margin-bottom: 0.25rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .total-ligne {
            font-weight: 600;
            color: #435ebe;
        }
    </style>
</section>
