version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: pg_berd
    restart: unless-stopped
    environment:
      POSTGRES_DB: berd_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d/ 

volumes:
  pgdata:
